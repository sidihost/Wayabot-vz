# Waya Bot - Simple Docker Compose (No Nginx/SSL)
# Use this for quick testing or when using an external reverse proxy
# 
# Usage: docker compose -f docker-compose.simple.yml up -d

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: waya-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-waya}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wayabot123}
      POSTGRES_DB: ${DB_NAME:-wayabot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-waya} -d ${DB_NAME:-wayabot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Waya Bot Application
  waya:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: waya-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-waya}:${DB_PASSWORD:-wayabot123}@postgres:5432/${DB_NAME:-wayabot}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      HUME_API_KEY: ${HUME_API_KEY:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
